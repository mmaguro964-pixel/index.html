<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>保存機能付きエディタ（修正版）</title>
    <style>
        :root { --bg: #1e1e1e; --header: #333; --accent: #4CAF50; --blue: #2196F3; }
        body { margin: 0; display: flex; flex-direction: column; height: 100vh; font-family: sans-serif; background: var(--bg); color: #fff; }
        header { padding: 10px; background: var(--header); display: flex; justify-content: space-between; align-items: center; }
        .controls { display: flex; gap: 10px; align-items: center; }
        button { padding: 6px 12px; border: none; border-radius: 4px; cursor: pointer; color: white; background: #555; }
        button.active { background: var(--blue); }
        .btn-run { background: var(--accent); }
        .editor-box { flex: 1; display: none; flex-direction: column; }
        .editor-box.active { display: flex; }
        .container { display: flex; flex: 1; overflow: hidden; }
        textarea { flex: 1; background: var(--bg); color: #d4d4d4; border: none; padding: 15px; font-family: monospace; font-size: 15px; outline: none; resize: none; }
        iframe { width: 100%; height: 100%; border: none; background: #fff; }
        .preview-area { flex: 1; display: flex; border-left: 2px solid #444; }
        .hidden { display: none; }
    </style>
</head>
<body>

<header>
    <div class="controls">
        <button id="btn-html" class="active" onclick="showEditor('html')">HTML</button>
        <button id="btn-css" onclick="showEditor('css')">CSS</button>
        <button id="btn-js" onclick="showEditor('js')">JS</button>
    </div>
    <div class="controls">
        <label><input type="checkbox" id="toggle-preview" checked onchange="togglePreview()"> プレビュー</label>
        <button class="btn-run" onclick="runCode()">保存して実行</button>
        <button onclick="openNewTab()">別タブで開く</button>
    </div>
</header>

<div class="container">
    <div class="editors">
        <div id="box-html" class="editor-box active"><textarea id="html-code" oninput="saveToLocal()" placeholder="HTMLを書く..."></textarea></div>
        <div id="box-css" class="editor-box"><textarea id="css-code" oninput="saveToLocal()" placeholder="CSSを書く..."></textarea></div>
        <div id="box-js" class="editor-box"><textarea id="js-code" oninput="saveToLocal()" placeholder="JSを書く..."></textarea></div>
    </div>
    <div id="preview-area" class="preview-area"><iframe id="output"></iframe></div>
</div>

<script>
    const STORAGE_KEY = 'my_editor_save_data_v1';

    // 1. 保存
    function saveToLocal() {
        const data = {
            html: document.getElementById('html-code').value,
            css: document.getElementById('css-code').value,
            js: document.getElementById('js-code').value
        };
        localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
        console.log("Saved!"); // ブラウザのコンソールで確認用
    }

    // 2. 読み込み
    function loadFromLocal() {
        const saved = localStorage.getItem(STORAGE_KEY);
        if (saved) {
            try {
                const data = JSON.parse(saved);
                document.getElementById('html-code').value = data.html || "";
                document.getElementById('css-code').value = data.css || "";
                document.getElementById('js-code').value = data.js || "";
            } catch (e) {
                console.error("読み込みエラー", e);
            }
        }
    }

    // 3. 実行
    function runCode() {
        saveToLocal(); // 実行時にも保存
        const html = document.getElementById('html-code').value;
        const css = document.getElementById('css-code').value;
        const js = document.getElementById('js-code').value;
        const iframe = document.getElementById('output').contentWindow.document;
        iframe.open();
        iframe.write(`<html><head><style>${css}</style></head><body>${html}<script>${js}<\/script></body></html>`);
        iframe.close();
    }

    function openNewTab() {
        const html = document.getElementById('html-code').value;
        const css = document.getElementById('css-code').value;
        const js = document.getElementById('js-code').value;
        const win = window.open('', '_blank');
        win.document.write(`<html><head><style>body{margin:0}${css}</style></head><body>
            <button onclick="window.close()" style="position:fixed;top:10px;right:10px;z-index:99;padding:10px;background:red;color:white;border:none;border-radius:5px;cursor:pointer;">閉じる</button>
            ${html}<script>${js}<\/script></body></html>`);
        win.document.close();
    }

    function showEditor(mode) {
        document.querySelectorAll('.editor-box').forEach(b => b.classList.remove('active'));
        document.querySelectorAll('.controls button').forEach(btn => btn.classList.remove('active'));
        document.getElementById(`box-${mode}`).classList.add('active');
        document.getElementById(`btn-${mode}`).classList.add('active');
    }

    function togglePreview() {
        document.getElementById('preview-area').classList.toggle('hidden', !document.getElementById('toggle-preview').checked);
    }

    // 起動時の処理
    window.addEventListener('DOMContentLoaded', () => {
        loadFromLocal();
        runCode();
    });
</script>
</body>
</html>
